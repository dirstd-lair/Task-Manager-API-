services:
  db:
    image: mysql:8.0
    container_name: taskflow_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: task_database
      MYSQL_USER: taskuser
      MYSQL_PASSWORD: taskpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 10s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: backend_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+asyncmy://taskuser:taskpassword@db:3306/task_database
      - SECRET_KEY=your-secret-key-change-in-production
      - JWT_SECRET_TOKEN=your-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: